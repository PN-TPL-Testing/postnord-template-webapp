name: CI — Build and push image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-output.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: {{GITHUB_DEPLOY_ROLE_ARN}}
          aws-region: {{AWS_REGION}}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            {{ECR_REPO_URI}}:${{ github.sha }}
            {{ECR_REPO_URI}}:latest
          # Persist the layer cache in the GitHub Actions cache so the next
          # build only redoes layers whose inputs changed (npm ci, vite build
          # and pip install are skipped when their inputs are unchanged).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image tag output
        id: set-output
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
